<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard Restaurante</title><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><style>body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0}.header{background:#ff5722;color:#fff;padding:15px}.container{max-width:1200px;margin:auto;padding:20px}.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}.input,button{padding:10px;margin:5px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:10px}</style></head><body><div class='header'><h1>Painel do Restaurante</h1></div><div class='container'><div class='card'><h2>Configuração Supabase</h2><input id='url' class='input' placeholder='SUPABASE_URL'><input id='key' class='input' placeholder='SUPABASE_ANON_KEY'><button onclick='conectar()'>Conectar</button></div><div class='card'><h2>Produtos</h2><input id='nome' class='input' placeholder='Nome'><input id='preco' class='input' placeholder='Preço'><button onclick='addProduto()'>Adicionar</button><table><thead><tr><th>Nome</th><th>Preço</th></tr></thead><tbody id='produtos'></tbody></table></div></div><script>let supabase;async function conectar(){supabase=window.supabase.createClient(url.value,key.value);alert('Conectado');listarProdutos()}async function addProduto(){const {error}=await supabase.from('products').insert([{name:nome.value,price:Number(preco.value)}]);if(!error)listarProdutos()}async function listarProdutos(){const {data}=await supabase.from('products').select('*');produtos.innerHTML='';data.forEach(p=>produtos.innerHTML+=`<tr><td>${p.name}</td><td>R$ ${p.price}</td></tr>`)};</script></body></html>
